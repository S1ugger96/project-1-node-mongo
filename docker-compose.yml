services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
    networks:
      - backend    
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5 

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - backend    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web      

volumes:
  mongo_data:

networks:
  backend:
